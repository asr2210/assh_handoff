<svg xmlns="http://www.w3.org/2000/svg" width="940" height="470" viewBox="0 0 940 470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#5b6470" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g id="input">
    <rect x="30" y="185" width="200" height="100" rx="10" fill="#f1efe8" stroke="#c9c7bd" stroke-width="1"/>
    <g id="input-icon" stroke="#5f5e5a" stroke-width="1.6" fill="none" stroke-linecap="round">
      <rect x="54" y="212" width="34" height="44" rx="3" fill="#ffffff"/>
      <line x1="61" y1="223" x2="81" y2="223"/>
      <line x1="61" y1="231" x2="81" y2="231"/>
      <line x1="61" y1="239" x2="75" y2="239"/>
    </g>
    <text x="104" y="228" font-size="15" font-weight="700" fill="#2b2f36">Clinician input</text>
    <text x="104" y="248" font-size="12.5" fill="#5f5e5a">free-text injury</text>
    <text x="104" y="264" font-size="12.5" fill="#5f5e5a">description</text>
  </g>

  <line x1="232" y1="235" x2="292" y2="235" stroke="#5b6470" stroke-width="1.6" marker-end="url(#arrow)"/>

  <g id="handoff">
    <rect x="295" y="175" width="230" height="120" rx="12" fill="#1f4e79" stroke="#163a5c" stroke-width="1"/>
    <text x="410" y="222" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">HANDOFF</text>
    <text x="410" y="248" font-size="12.5" fill="#cfe0f0" text-anchor="middle">matches the presentation to</text>
    <text x="410" y="265" font-size="12.5" fill="#cfe0f0" text-anchor="middle">ASSH/ACEP guideline criteria</text>
  </g>

  <g id="branches" fill="none" stroke="#5b6470" stroke-width="1.6">
    <path d="M525 220 C575 220, 575 92, 612 92" marker-end="url(#arrow)"/>
    <path d="M525 235 C575 235, 575 235, 612 235" marker-end="url(#arrow)"/>
    <path d="M525 250 C575 250, 575 378, 612 378" marker-end="url(#arrow)"/>
  </g>

  <g id="out-clear">
    <rect x="615" y="37" width="295" height="110" rx="10" fill="#ffffff" stroke="#1f4e79" stroke-width="1.4"/>
    <circle cx="645" cy="70" r="15" fill="#1f4e79"/>
    <path d="M638 70 L643 75 L653 64" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="672" y="68" font-size="15" font-weight="700" fill="#1f4e79">Clear case</text>
    <text x="672" y="92" font-size="12.5" fill="#3d3d3a">Returns the category, the guideline</text>
    <text x="672" y="109" font-size="12.5" fill="#3d3d3a">criterion, and the reasoning.</text>
  </g>

  <g id="out-close">
    <rect x="615" y="180" width="295" height="110" rx="10" fill="#ffffff" stroke="#b5651d" stroke-width="1.4"/>
    <circle cx="645" cy="213" r="15" fill="#b5651d"/>
    <g stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round">
      <path d="M645 206 L645 214"/>
      <path d="M645 214 L639 221"/>
      <path d="M645 214 L651 221"/>
    </g>
    <text x="672" y="211" font-size="15" font-weight="700" fill="#8a4a14">Close call</text>
    <text x="672" y="235" font-size="12.5" fill="#3d3d3a">Flags the case and shows both the</text>
    <text x="672" y="252" font-size="12.5" fill="#3d3d3a">lower- and higher-acuity readings.</text>
  </g>

  <g id="out-incomplete">
    <rect x="615" y="323" width="295" height="110" rx="10" fill="#ffffff" stroke="#0f6e56" stroke-width="1.4"/>
    <circle cx="645" cy="356" r="15" fill="#0f6e56"/>
    <text x="645" y="362" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">?</text>
    <text x="672" y="354" font-size="15" font-weight="700" fill="#0b5240">Incomplete information</text>
    <text x="672" y="378" font-size="12.5" fill="#3d3d3a">Requests the specific finding the</text>
    <text x="672" y="395" font-size="12.5" fill="#3d3d3a">disposition depends on.</text>
  </g>
</svg>
